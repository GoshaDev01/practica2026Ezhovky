<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorisation</title>
    <link href="bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<style>
    body {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
    }
    .toggle {
        margin-left: -5px;
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
    }
</style>
<body>
    <form class="card bg-light auuuth">
        <legend class="text-center mb-4 fs-1">Вход</legend>
        <div class="form-group has-float-label">
            <label for="name">Login</label>
            <input class="form-control" id="name" type="text">
        </div>
        <div class="form-group has-float-label">
            <label for="password">Password</label>
            <input class="form-control" id="password" type="password" placeholder="••••••••">
        </div>
        <div class="text-center mt-4">
            <button onclick="window.location.href='page2.html';" class="auth btn px-5" type="button">Войти</button> 
        </div>
        <div class="mt-3 text-center">
            <button class="toggle btn">
                <i class="bi bi-moon-stars-fill theme-icon"></i>
            </button>
        </div>
    </form>
</body>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/4.0.0/jquery.min.js"></script>
<script defer src="Theme.js"></script>
<script src="bootstrap.bundle.min.js"></script>

</html>
